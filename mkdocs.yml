- Create paired documentation: skills/create-doc.md
    - Create PR: skills/create-pr.md
    - Create Rule: skills/create-rule.md
- dev: skills/dev.md
    - docs: skills/docs.md
    - format: skills/format.md
    - LangGraph testing: skills/langgraph-testing.md
    - lint: skills/lint.md
